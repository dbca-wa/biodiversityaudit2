server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Prevent insecure redirect chains when behind TLS-terminating proxy
    absolute_redirect off;
    port_in_redirect off;

    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Pragma "no-cache" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy - tightened with all recommended directives
    # Note: unsafe-inline/unsafe-eval required for RequireJS and Underscore.js templates
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://*.dbca.wa.gov.au https://*.wa.gov.au; img-src 'self' data: https:; connect-src 'self' https://*.dbca.wa.gov.au https://*.wa.gov.au; font-src 'self' data: https://*.dbca.wa.gov.au https://*.wa.gov.au; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; report-uri /csp-report; report-to csp-endpoint;" always;

    # CSP Reporting endpoint group header (report-to directive support)
    add_header Report-To '{"group":"csp-endpoint","max_age":86400,"endpoints":[{"url":"/csp-report"}]}' always;

    # Block access to sensitive/config files that should not be publicly accessible
    location ~* ^/(nginx\.conf|Dockerfile|\.dockerignore|LICENSE|README\.md)$ {
        return 404;
    }
    location ~ /\. {
        return 404;
    }

    # CSP violation report sink (accept and discard - no backend to process)
    location = /csp-report {
        return 204;
    }

    # SPA routing - serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets (CSS, JS, images) - short CDN TTL for faster invalidation
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cache-Control "public, max-age=3600, s-maxage=600" always;
        add_header Surrogate-Control "max-age=600" always;
    }

    # Prevent directory listing
    autoindex off;
}
